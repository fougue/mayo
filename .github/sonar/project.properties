sonar.projectKey=fougue_mayo
sonar.organization=fougue
sonar.sources=.
sonar.cfamily.cpp-standard=c++17
sonar.inclusions=src/**/*.cpp,src/**/*.h
sonar.exclusions=**/3rdparty/**,**/*moc_*.cpp,**/ui_*.h
sonar.cfamily.compile-commands=bw-output/compile_commands.json
sonar.host.url=https://sonarcloud.io

# Disabled rules
# cpp:S3608: Explicitly capture the required scope variables
# cpp:S5019: Explicitly capture all local variables required in this lambda
# cpp:S6004: Use the init-statement to declare "<variable>" inside the if statement
sonar.issue.ignore.multicriteria=e1,e2,e3

sonar.issue.ignore.multicriteria.e1.ruleKey=cpp:S3608
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.cpp

sonar.issue.ignore.multicriteria.e2.ruleKey=cpp:S5019
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.cpp

sonar.issue.ignore.multicriteria.e3.ruleKey=cpp:S6004
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*.cpp
